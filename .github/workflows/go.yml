name: Build release
on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Cross-compile
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -o dist/kobo-infect-linux-amd64       -v .
          GOOS=linux   GOARCH=arm64 go build -o dist/kobo-infect-linux-arm64       -v .
          GOOS=darwin  GOARCH=amd64 go build -o dist/kobo-infect-darwin-amd64      -v .
          GOOS=darwin  GOARCH=arm64 go build -o dist/kobo-infect-darwin-arm64      -v .
          GOOS=windows GOARCH=amd64 go build -o dist/kobo-infect-windows-amd64.exe -v .

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
